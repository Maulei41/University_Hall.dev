name: Deploy mu-plugin via Webhook URL

on:
  push:
    branches:
      - main # Triggers the deploy automatically when you merge into main

jobs:
  deploy-to-wordpress:
    runs-on: ubuntu-latest

    steps:
      # 1. Download the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Package your files into a clean zip
      # This keeps your folder structure neat and skips git files
      - name: Zip mu-plugin files
        run: |
          zip -r mu-plugin-package.zip . -x "*.git*" ".github*"

      # 3. Fire the Webhook to WordPress with the zip file payload
      # Note: If your plugin expects 'plugin_file' instead of 'file', change it below.
      - name: Trigger WordPress Webhook URL
        run: |
          curl -X POST "${{ secrets.WP_WEBHOOK_URL }}" \
            -F "file=@mu-plugin-package.zip" \
            -H "Content-Type: multipart/form-data"